<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande KULANZ - GE Auto</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 900px; margin: 0 auto; padding: 20px; 
            background: #f5f5f5; line-height: 1.6;
        }
        .header { 
            background: linear-gradient(135deg, #1e3a8a, #3b82f6); 
            color: white; padding: 30px; border-radius: 12px; 
            text-align: center; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(30,58,138,0.3);
        }
        .header h1 { font-size: 2.2em; margin-bottom: 10px; }
        .header-info { 
            background: rgba(255,255,255,0.15); padding: 20px; 
            border-radius: 8px; display: inline-block;
        }
        .form-section { 
            background: white; margin-bottom: 25px; 
            padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .form-row { 
            display: grid; grid-template-columns: 250px 1fr; 
            gap: 20px; margin-bottom: 20px; align-items: start;
        }
        .form-row.full { grid-template-columns: 1fr; }
        .form-row.double { grid-template-columns: 1fr 1fr; gap: 15px; }
        label { 
            font-weight: 600; color: #1e3a8a; 
            display: block; margin-bottom: 8px; font-size: 0.95em;
        }
        input, select, textarea { 
            width: 100%; padding: 12px 15px; 
            border: 2px solid #e5e7eb; border-radius: 8px; 
            font-size: 1em; transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        textarea { min-height: 100px; resize: vertical; }
        .checkbox-row { 
            display: flex; gap: 20px; margin: 10px 0; 
            flex-wrap: wrap;
        }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input[type="checkbox"] { width: auto; }
        .nok-warning { 
            background: #fef2f2; border: 1px solid #fecaca; 
            color: #dc2626; padding: 12px; border-radius: 8px; 
            margin: 10px 0; font-weight: 500;
        }
        .submit-section { 
            background: linear-gradient(135deg, #10b981, #059669); 
            text-align: center; padding: 30px; border-radius: 12px;
        }
        .btn-submit { 
            background: white; color: #059669; 
            border: none; padding: 18px 50px; 
            font-size: 1.2em; font-weight: 700; 
            border-radius: 12px; cursor: pointer; 
            transition: all 0.3s; box-shadow: 0 10px 30px rgba(16,185,129,0.3);
        }
        .btn-submit:hover:not(:disabled) { 
            transform: translateY(-3px); box-shadow: 0 15px 40px rgba(16,185,129,0.4);
        }
        .btn-submit:disabled { 
            opacity: 0.6; cursor: not-allowed; 
            background: #d1d5db; color: #6b7280;
        }
        .brand-logo { 
            width: 120px; height: auto; margin: 0 10px; 
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        .required { color: #dc2626; }
        @media (max-width: 768px) {
            .form-row, .form-row.double { grid-template-columns: 1fr; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Formulaire de Demande KULANZ</h1>
        <div class="header-info">
            <strong>KVPS:</strong> <select id="kvps"><option>02155</option><option>02153</option><option>02154</option><option>02485</option><option>02486</option><option>63930</option><option>2376</option></select> | 
            <strong>N° OR:</strong> <input type="text" id="numeroOR" maxlength="6" required> | 
            <strong>Date OR:</strong> <input type="date" id="dateOR" required>
            <br><strong>Marques:</strong> 
            <img src="https://www.audi.fr/content/dam/vwgroup/audi/fr/fr/webcode/logo/audi-logo.png" class="brand-logo" alt="Audi" title="Audi">
            <img src="https://www.seat.fr/content/dam/seat/seat-site.png" class="brand-logo" alt="SEAT" title="SEAT">
            <img src="https://www.skoda-auto.fr/content/dam/skoda/www/SKODA_Website/SKODA_Header_Logo.png" class="brand-logo" alt="Skoda" title="Skoda">
            <img src="https://www.volkswagen.fr/typo3conf/ext/vw_base/Resources/Public/Icons/vw-logo.svg" class="brand-logo" alt="VW" title="VW">
            <img src="https://www.volkswagen-utilitaires.fr/content/dam/vwgroup/volkswagen_utilitaires/france/logos/vw-logo-utilitaires.png" class="brand-logo" alt="VW Utilitaire" title="VW Utilitaire">
        </div>
    </div>

    <form id="kulanzForm">
        <div class="form-section">
            <div class="form-row">
                <label>Châssis <span class="required">*</span></label>
                <input type="text" id="chassis" maxlength="17" required placeholder="VF1xxxxxxxxxxxxxx">
            </div>
            <div class="form-row">
                <label>Kilométrage <span class="required">*</span></label>
                <input type="number" id="kilometrage" min="0" required placeholder="150000">
            </div>
            <div class="form-row full">
                <label>Plainte du client <span class="required">*</span></label>
                <textarea id="plainteClient" required placeholder="Décrivez précisément la plainte du client..."></textarea>
            </div>
            <div class="form-row">
                <label>Type d'avarie <span class="required">*</span></label>
                <select id="typeAvarie" required>
                    <option value="">Choisissez...</option>
                    <option value="Mécanique">Mécanique</option>
                    <option value="Electrique">Electrique</option>
                    <option value="Carrosserie">Carrosserie</option>
                    <option value="Climatisation">Climatisation</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>
            <div class="form-row double">
                <div>
                    <label>Pièce à l'origine du dommage - Référence <span class="required">*</span></label>
                    <input type="text" id="refPiece" required placeholder="85B423064B">
                </div>
                <div>
                    <label>Désignation <span class="required">*</span></label>
                    <input type="text" id="designationPiece" required placeholder="Direction assistée">
                </div>
            </div>
            <div class="form-row">
                <label>Emplacement</label>
                <div class="checkbox-row">
                    <div class="checkbox-group">
                        <input type="checkbox" id="gauche">
                        <label for="gauche">GAUCHE</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="droite">
                        <label for="droite">DROIT</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-row">
                <label>Il y a-t-il une TPI ?</label>
                <div class="checkbox-row">
                    <div class="checkbox-group">
                        <input type="radio" name="tpi" id="tpiOui" value="OUI">
                        <label for="tpiOui">OUI</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="radio" name="tpi" id="tpiNon" value="NON" checked>
                        <label for="tpiNon">NON</label>
                    </div>
                </div>
            </div>
            <div class="form-row" id="numeroTPIGroup" style="display:none;">
                <label>Numéro de TPI</label>
                <input type="text" id="numeroTPI" placeholder="TPI-XXXXX">
            </div>
            <div class="form-row double">
                <div>
                    <label>Code dommage</label>
                    <input type="text" id="codeDommage" placeholder="P1234">
                </div>
                <div>
                    <label>Code avarie</label>
                    <input type="text" id="codeAvarie" placeholder="E4567">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3 style="color:#1e3a8a; margin-bottom:20px;">Vérifications obligatoires</h3>
            
            <div class="form-row">
                <label>Garantie OPTEVEN visible dans ELSA ?</label>
                <div class="checkbox-row">
                    <div class="checkbox-group">
                        <input type="radio" name="opteven" id="optevenOui" value="OUI">
                        <label for="optevenOui">OUI</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="radio" name="opteven" id="optevenNon" value="NON" checked>
                        <label for="optevenNon">NON</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <label>Un code 'tuning' dans SAGA/2 ou ODIS ?</label>
                <div class="checkbox-row">
                    <div class="checkbox-group">
                        <input type="radio" name="tuning" id="tuningOui" value="OUI">
                        <label for="tuningOui">OUI</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="radio" name="tuning" id="tuningNon" value="NON" checked>
                        <label for="tuningNon">NON</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <label>Préconisations constructeur respectées ?</label>
                <div class="checkbox-row">
                    <div class="checkbox-group">
                        <input type="radio" name="entretiens" id="entretiensOui" value="OUI">
                        <label for="entretiensOui">OUI</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="radio" name="entretiens" id="entretiensNon" value="NON" checked>
                        <label for="entretiensNon">NON</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <label>Dernier entretien chez AUDI ou vendu au client ?</label>
                <div class="checkbox-row">
                    <div class="checkbox-group">
                        <input type="radio" name="dernierEntretien" id="entretienOui" value="OUI">
                        <label for="entretienOui">OUI</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="radio" name="dernierEntretien" id="entretienNon" value="NON" checked>
                        <label for="entretienNon">NON ⏪ [NOK]</label>
                    </div>
                </div>
                <div class="nok-warning" id="entretienWarning" style="display:none;">
                    ⚠️ Dernier entretien NON conforme = DEMANDE REJETÉE
                </div>
            </div>

            <div class="form-row">
                <label>Lien entre dommage et entretien ?</label>
                <div class="checkbox-row">
                    <div class="checkbox-group">
                        <input type="radio" name="lienEntretien" id="lienOui" value="OUI">
                        <label for="lienOui">OUI ⏪ [NOK] sauf tous entretiens OK</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="radio" name="lienEntretien" id="lienNon" value="NON" checked>
                        <label for="lienNon">NON</label>
                    </div>
                </div>
            </div>

            <div class="form-row full">
                <label>Commentaires supplémentaires</label>
                <textarea id="commentaires" placeholder="Informations complémentaires..."></textarea>
            </div>
        </div>

        <div class="submit-section">
            <button type="submit" class="btn-submit" id="submitBtn">
                📧 Envoyer à teamgarantie@geauto.fr
            </button>
            <p style="color: white; margin-top: 15px; opacity: 0.9;">
                Le formulaire sera envoyé automatiquement pour traitement
            </p>
        </div>
    </form>

    <script>
        // Configuration EmailJS (remplacer YOUR_PUBLIC_KEY par votre clé EmailJS)
        emailjs.init("YOUR_PUBLIC_KEY"); // À configurer sur emailjs.com

        const form = document.getElementById('kulanzForm');
        const submitBtn = document.getElementById('submitBtn');

        // Toggle TPI number
        document.querySelectorAll('input[name="tpi"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.getElementById('numeroTPIGroup').style.display = 
                    document.getElementById('tpiOui').checked ? 'grid' : 'none';
            });
        });

        // Warning dernier entretien
        document.querySelectorAll('input[name="dernierEntretien"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const warning = document.getElementById('entretienWarning');
                warning.style.display = document.getElementById('entretienNon').checked ? 'block' : 'none';
            });
        });

        // Validation et envoi
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Envoi en cours...';

            // Collecter les données
            const formData = {
                kvps: document.getElementById('kvps').value,
                numeroOR: document.getElementById('numeroOR').value,
                dateOR: document.getElementById('dateOR').value,
                chassis: document.getElementById('chassis').value,
                kilometrage: document.getElementById('kilometrage').value,
                plainteClient: document.getElementById('plainteClient').value,
                typeAvarie: document.getElementById('typeAvarie').value,
                refPiece: document.getElementById('refPiece').value,
                designationPiece: document.getElementById('designationPiece').value,
                emplacement: (document.getElementById('gauche').checked ? 'GAUCHE ' : '') + 
                           (document.getElementById('droite').checked ? 'DROIT' : ''),
                tpi: document.querySelector('input[name="tpi"]:checked').value,
                numeroTPI: document.getElementById('numeroTPI').value || 'N/A',
                codeDommage: document.getElementById('codeDommage').value || 'N/A',
                codeAvarie: document.getElementById('codeAvarie').value || 'N/A',
                opteven: document.querySelector('input[name="opteven"]:checked').value,
                tuning: document.querySelector('input[name="tuning"]:checked').value,
                entretiens: document.querySelector('input[name="entretiens"]:checked').value,
                dernierEntretien: document.querySelector('input[name="dernierEntretien"]:checked').value,
                lienEntretien: document.querySelector('input[name="lienEntretien"]:checked').value,
                commentaires: document.getElementById('commentaires').value || 'Aucun'
            };

            // Validation finale
            if (document.getElementById('entretienNon').checked) {
                if (!confirm('⚠️ Dernier entretien NON conforme. Confirmez-vous l\'envoi ?')) {
                    resetForm();
                    return;
                }
            }

            try {
                // Générer PDF ou HTML pour pièce jointe (optionnel)
                const formHTML = generateFormHTML(formData);
                
                // Envoyer par EmailJS
                await emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', formData);
                
                alert('✅ Demande KULANZ envoyée à teamgarantie@geauto.fr !\n\nCopie du formulaire:\n' + formHTML.substring(0, 500) + '...');
                
                // Reset form
                form.reset();
                resetForm();
                
            } catch (error) {
                console.error('Erreur envoi:', error);
                alert('❌ Erreur envoi. Vérifiez votre connexion ou contactez IT.\n\nVous pouvez copier les données:\n' + JSON.stringify(formData, null, 2));
            }
        });

        function resetForm() {
            submitBtn.disabled = false;
            submitBtn.textContent = '📧 Envoyer à teamgarantie@geauto.fr';
            document.getElementById('numeroTPIGroup').style.display = 'none';
            document.getElementById('entretienWarning').style.display = 'none';
        }

        function generateFormHTML(data) {
            return `
**KVPS:** ${data.kvps} | **OR:** ${data.numeroOR} | **Date:** ${data.dateOR}
**Châssis:** ${data.chassis} | **KM:** ${data.kilometrage}
**Plainte:** ${data.plainteClient}
**Pièce:** ${data.refPiece} - ${data.designationPiece} (${data.emplacement})
**TPI:** ${data.tpi} ${data.numeroTPI !== 'N/A' ? data.numeroTPI : ''}
**Codes:** Dommage=${data.codeDommage} Avarie=${data.codeAvarie}
**Vérifications:** OPTEVEN=${data.opteven} | Tuning=${data.tuning} | Entretiens=${data.entretiens} | Dernier=${data.dernierEntretien} | Lien=${data.lienEntretien}
**Commentaires:** ${data.commentaires}
            `;
        }

        // Date OR par défaut = aujourd'hui
        document.getElementById('dateOR').valueAsDate = new Date();
    </script>
</body>
</html>
